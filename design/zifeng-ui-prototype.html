<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1">
<title>紫枫免费小说 — 完整 UI 原型（13 页面）</title>
<style>
/* ============================================================
   紫枫免费小说 · 完整 UI 原型
   设计系统：5 套主题色（默认蓝）/ 明暗双模式 / 8pt 网格
   ============================================================ */

:root {
  /* 主色 — 经典蓝 */
  --primary: #1890ff;
  --primary-1: #bae7ff;
  --primary-2: #91d5ff;
  --primary-3: #69c0ff;
  --primary-4: #40a9ff;
  --primary-6: #096dd9;
  --primary-7: #0050b3;

  /* 语义色 */
  --success: #52c41a;
  --warning: #faad14;
  --error: #f5222d;
  --gold: #fa8c16;

  /* 中性色（浅色） */
  --bg-layout: #f0f2f5;
  --bg-container: #ffffff;
  --bg-elevated: #ffffff;
  --bg-subtle: #fafafa;
  --border: #e8e8e8;
  --border-split: #f0f0f0;
  --text-1: #1a1a2e;
  --text-2: #4a4a5e;
  --text-3: #8c8c8c;
  --text-4: #bfbfbf;

  /* 阴影 */
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);
  --shadow-card: 0 2px 8px rgba(0,0,0,0.06);

  /* 圆角 */
  --r-sm: 6px;
  --r-md: 8px;
  --r-lg: 12px;
  --r-xl: 16px;

  /* 字号 */
  --fs-12: 12px;
  --fs-13: 13px;
  --fs-14: 14px;
  --fs-15: 15px;
  --fs-16: 16px;
  --fs-18: 18px;
  --fs-20: 20px;
  --fs-24: 24px;
  --fs-28: 28px;
  --fs-32: 32px;
}

[data-theme="dark"] {
  --bg-layout: #000000;
  --bg-container: #141414;
  --bg-elevated: #1f1f1f;
  --bg-subtle: #1a1a1a;
  --border: #303030;
  --border-split: #262626;
  --text-1: #f0f0f0;
  --text-2: #c4c4c4;
  --text-3: #8a8a8a;
  --text-4: #5c5c5c;
  --shadow-card: 0 2px 8px rgba(0,0,0,0.4);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 14px;
  color: var(--text-1);
  background: #1e1e2e;
  -webkit-font-smoothing: antialiased;
}

/* ====== 顶层布局：左侧导览 + 右侧画布 ====== */
.app-shell {
  display: flex;
  min-height: 100vh;
}

.side-nav {
  width: 260px;
  flex-shrink: 0;
  background: #16161e;
  color: #d0d0d8;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  border-right: 1px solid #26262e;
}
.side-nav-header {
  padding: 24px 20px 16px;
  border-bottom: 1px solid #26262e;
}
.side-nav-header .brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
}
.side-nav-header .brand .logo {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-3));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 18px;
  box-shadow: 0 4px 12px rgba(24,144,255,0.4);
}
.side-nav-header .sub {
  margin-top: 8px;
  font-size: 11px;
  color: #6a6a78;
  letter-spacing: 0.5px;
}

.side-nav-group {
  padding: 16px 0 8px;
}
.side-nav-group-title {
  padding: 8px 20px 6px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #5a5a68;
}
.side-nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 20px;
  font-size: 13px;
  color: #b0b0bc;
  cursor: pointer;
  transition: all 0.15s ease;
  border-left: 3px solid transparent;
  user-select: none;
}
.side-nav-item:hover {
  background: rgba(255,255,255,0.04);
  color: #e0e0e8;
}
.side-nav-item.active {
  background: linear-gradient(90deg, rgba(24,144,255,0.18), transparent);
  color: #fff;
  border-left-color: var(--primary);
  font-weight: 500;
}
.side-nav-item .num {
  width: 22px; height: 22px;
  border-radius: 6px;
  background: rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  color: #8a8a98;
  font-weight: 600;
}
.side-nav-item.active .num {
  background: var(--primary);
  color: #fff;
}
.side-nav-item .icon {
  font-size: 14px;
  width: 16px;
  text-align: center;
}

.side-nav-footer {
  margin-top: auto;
  padding: 16px 20px;
  border-top: 1px solid #26262e;
  font-size: 11px;
  color: #5a5a68;
  line-height: 1.6;
}
.side-nav-footer .theme-pills {
  display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap;
}
.theme-pill {
  width: 22px; height: 22px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent;
  transition: transform 0.15s;
}
.theme-pill:hover { transform: scale(1.12); }
.theme-pill.active { border-color: #fff; }

/* ====== 右侧画布区 ====== */
.canvas-area {
  flex: 1;
  min-width: 0;
  background: #0e0e16;
  padding: 24px;
  overflow-x: auto;
}
.canvas-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  color: #b0b0bc;
  font-size: 12px;
}
.canvas-toolbar .crumb {
  display: flex; align-items: center; gap: 8px;
}
.canvas-toolbar .crumb .dot { color: #4a4a58; }
.canvas-toolbar .actions { display: flex; gap: 8px; }
.canvas-toolbar .btn-mini {
  padding: 5px 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid #26262e;
  border-radius: 6px;
  color: #b0b0bc;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.15s;
}
.canvas-toolbar .btn-mini:hover {
  background: rgba(255,255,255,0.1);
  color: #fff;
}
.canvas-toolbar .btn-mini.active {
  background: var(--primary);
  border-color: var(--primary);
  color: #fff;
}

/* 画布框架 — 模拟一个浏览器窗口 */
.canvas-frame {
  width: 1440px;
  margin: 0 auto;
  background: var(--bg-layout);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  position: relative;
}
.canvas-frame .browser-bar {
  height: 36px;
  background: #2a2a36;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 8px;
}
.canvas-frame .browser-bar .dot-r { width: 11px; height: 11px; border-radius: 50%; background: #ff5f57; }
.canvas-frame .browser-bar .dot-y { width: 11px; height: 11px; border-radius: 50%; background: #febc2e; }
.canvas-frame .browser-bar .dot-g { width: 11px; height: 11px; border-radius: 50%; background: #28c840; }
.canvas-frame .browser-bar .url {
  flex: 1;
  background: #1a1a24;
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 11px;
  color: #8a8a98;
  margin-left: 8px;
  font-family: monospace;
}

/* 页面容器 */
.page { display: none; }
.page.active { display: block; }

/* ============ 顶部导航 Navbar（通用） ============ */
.navbar {
  height: 64px;
  background: var(--bg-container);
  border-bottom: 1px solid var(--border-split);
  display: flex;
  align-items: center;
  padding: 0 24px;
  position: sticky;
  top: 0;
  z-index: 100;
  gap: 24px;
}
.navbar .logo {
  display: flex; align-items: center; gap: 10px;
  font-size: 18px; font-weight: 700;
  color: var(--primary);
  flex-shrink: 0;
}
.navbar .logo .logo-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--primary), var(--primary-3));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 16px;
  box-shadow: 0 4px 12px rgba(24,144,255,0.35);
}
.navbar-menu {
  display: flex;
  gap: 4px;
  flex: 1;
}
.navbar-menu .menu-item {
  padding: 8px 16px;
  font-size: 14px;
  color: var(--text-2);
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.15s;
  position: relative;
}
.navbar-menu .menu-item:hover { color: var(--primary); background: rgba(24,144,255,0.06); }
.navbar-menu .menu-item.active {
  color: var(--primary);
  font-weight: 500;
}
.navbar-menu .menu-item.active::after {
  content: '';
  position: absolute;
  bottom: -22px;
  left: 16px; right: 16px;
  height: 2px;
  background: var(--primary);
  border-radius: 2px;
}
.navbar-right {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.search-box {
  width: 260px;
  height: 36px;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 0 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-3);
  cursor: text;
}
.search-box .search-icon { color: var(--text-3); }
.user-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 12px 4px 4px;
  border-radius: 20px;
  border: 1px solid var(--primary);
  background: rgba(24,144,255,0.08);
  cursor: pointer;
  height: 36px;
  transition: all 0.2s;
}
.user-chip:hover {
  background: rgba(24,144,255,0.16);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(24,144,255,0.25);
}
.user-chip .avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-3));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 600;
  border: 2px solid var(--primary);
}
.user-chip .uname {
  font-size: 13px; font-weight: 600; color: var(--primary);
}
.theme-switch {
  width: 44px; height: 22px;
  background: var(--border);
  border-radius: 11px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
}
.theme-switch::after {
  content: '☀';
  position: absolute;
  top: 2px; left: 2px;
  width: 18px; height: 18px;
  background: #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  transition: all 0.2s;
}
[data-theme="dark"] .theme-switch { background: var(--primary); }
[data-theme="dark"] .theme-switch::after { left: 24px; content: '☾'; }

/* ============ 通用页面内容容器 ============ */
.page-content {
  padding: 24px 32px 48px;
  max-width: 1380px;
  margin: 0 auto;
}

/* 通用卡片 */
.card {
  background: var(--bg-container);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  transition: all 0.2s;
}
.card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

/* 章节标题（渐变 + 左色条） */
.section-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
  padding-bottom: 12px;
}
.section-title .title-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.section-title .title-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-3));
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 16px;
  box-shadow: 0 4px 12px rgba(24,144,255,0.3);
  position: relative;
}
.section-title .title-icon::before {
  content: '';
  position: absolute;
  left: -10px; top: 50%;
  transform: translateY(-50%);
  width: 4px; height: 24px;
  background: var(--primary);
  border-radius: 2px;
}
.section-title .title-text {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-1);
}
.section-title .title-sub {
  font-size: 12px;
  color: var(--text-3);
  margin-top: 2px;
}
.section-title .more-link {
  display: flex; align-items: center; gap: 4px;
  font-size: 13px;
  color: var(--primary);
  cursor: pointer;
}

/* 小说卡片（小） */
.novel-card {
  background: var(--bg-container);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.2s;
}
.novel-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-lg);
}
.novel-card .cover {
  width: 100%;
  height: 220px;
  background: linear-gradient(135deg, #e0e8f5, #c5d4ea);
  position: relative;
  overflow: hidden;
}
.novel-card .cover .cover-text {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: 700;
  color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  padding: 12px;
  text-align: center;
}
.novel-card .cover .rank-badge {
  position: absolute;
  top: 10px; left: 10px;
  background: linear-gradient(135deg, var(--error), var(--gold));
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(245,34,45,0.4);
}
.novel-card .cover .score-badge {
  position: absolute;
  top: 10px; right: 10px;
  background: rgba(0,0,0,0.5);
  color: var(--warning);
  font-size: 12px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 10px;
}
.novel-card .body {
  padding: 12px 14px;
}
.novel-card .name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-1);
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.novel-card .author {
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 8px;
}
.novel-card .tags {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.novel-card .tag {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(24,144,255,0.08);
  color: var(--primary);
}

/* 榜单行（列表式） */
.rank-list {
  background: var(--bg-container);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-card);
  overflow: hidden;
}
.rank-list-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border-split);
  transition: background 0.15s;
  cursor: pointer;
}
.rank-list-item:last-child { border-bottom: none; }
.rank-list-item:hover { background: var(--bg-subtle); }
.rank-list-item .rank-num {
  width: 28px; height: 28px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  background: var(--bg-subtle);
  color: var(--text-3);
  flex-shrink: 0;
}
.rank-list-item.top-1 .rank-num { background: linear-gradient(135deg, #f5222d, #fa541c); color: #fff; }
.rank-list-item.top-2 .rank-num { background: linear-gradient(135deg, #fa8c16, #faad14); color: #fff; }
.rank-list-item.top-3 .rank-num { background: linear-gradient(135deg, #faad14, #d4b106); color: #fff; }
.rank-list-item .mini-cover {
  width: 50px; height: 68px;
  border-radius: 6px;
  background: linear-gradient(135deg, #d4dcea, #b8c8de);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.3);
  flex-shrink: 0;
  text-align: center;
  padding: 4px;
}
.rank-list-item .info {
  flex: 1; min-width: 0;
}
.rank-list-item .info .name {
  font-size: 14px; font-weight: 600; color: var(--text-1);
  margin-bottom: 4px;
  display: flex; align-items: center; gap: 8px;
}
.rank-list-item .info .meta {
  font-size: 12px; color: var(--text-3);
  display: flex; gap: 12px;
  margin-bottom: 4px;
}
.rank-list-item .info .summary {
  font-size: 12px; color: var(--text-3);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.rank-list-item .score-col {
  font-size: 16px; font-weight: 700; color: var(--gold);
  flex-shrink: 0;
  text-align: right;
}
.rank-list-item .score-col .label {
  font-size: 10px; color: var(--text-4); font-weight: 400;
  display: block;
}

/* Tag 通用 */
.tag {
  display: inline-flex;
  align-items: center;
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 4px;
  background: rgba(24,144,255,0.08);
  color: var(--primary);
}
.tag.green { background: rgba(82,196,26,0.1); color: var(--success); }
.tag.orange { background: rgba(250,140,22,0.1); color: var(--gold); }
.tag.red { background: rgba(245,34,45,0.1); color: var(--error); }
.tag.gray { background: var(--bg-subtle); color: var(--text-3); }

/* 按钮 */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  font-size: 13px;
  border-radius: var(--r-md);
  border: 1px solid var(--border);
  background: var(--bg-container);
  color: var(--text-1);
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { color: var(--primary); border-color: var(--primary); }
.btn.primary {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  box-shadow: 0 4px 12px rgba(24,144,255,0.25);
}
.btn.primary:hover { background: var(--primary-4); transform: translateY(-1px); box-shadow: 0 6px 16px rgba(24,144,255,0.35); }
.btn.large { padding: 10px 24px; font-size: 14px; }
.btn.danger { color: var(--error); border-color: var(--error); }
.btn.text { border: none; background: transparent; color: var(--primary); padding: 4px 8px; }

/* 表单输入框 */
.input {
  width: 100%;
  height: 40px;
  padding: 0 14px;
  background: var(--bg-container);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  font-size: 14px;
  color: var(--text-1);
  transition: all 0.15s;
}
.input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(24,144,255,0.12);
}

/* Empty 状态 */
.empty {
  padding: 60px 20px;
  text-align: center;
  color: var(--text-3);
}
.empty .icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

/* 分割线 */
.divider { height: 1px; background: var(--border-split); margin: 16px 0; }

/* 翻页 */
.pagination {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 24px;
}
.pagination .pg {
  min-width: 32px; height: 32px;
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  color: var(--text-2);
  background: var(--bg-container);
  cursor: pointer;
  padding: 0 8px;
}
.pagination .pg.active { background: var(--primary); color: #fff; border-color: var(--primary); }
.pagination .pg:hover:not(.active) { color: var(--primary); border-color: var(--primary); }

</style>
</head>

<div class="app-shell">

  <!-- ========== 左侧导览 ========== -->
  <aside class="side-nav">

      </div>

    </div>

    <div class="side-nav-group">
      <div class="side-nav-group-title">主导航页面</div>
      <div class="side-nav-item active" data-page="home">
        <span class="num">1</span><span class="icon">🏠</span><span>首页</span>
      </div>
      <div class="side-nav-item" data-page="category">

                  <button class="btn primary" style="font-size:12px;padding:5px 14px;">📖 开始阅读</button>
                  <button class="btn" style="font-size:12px;padding:5px 14px;">＋ 加入书架</button>
                  <button class="btn text" style="font-size:12px;">查看详情 →</button>
                </div>
              </div>
            </div>`).join('')}
        </div>

        ${paginationHTML()}

        <!-- 搜索建议 -->
        <div style="margin-top:32px;padding:20px;background:var(--bg-container);border-radius:12px;box-shadow:var(--shadow-card);">
          <div style="font-size:13px;color:var(--text-3);margin-bottom:12px;">💡 相关搜索推荐</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            ${['爱潜水的乌贼','蒸汽朋克','克苏鲁','奇幻小说','序列','愚者','塔罗会'].map(t => `
              <span class="tag" style="cursor:pointer;padding:5px 12px;">${t}</span>
            `).join('')}
          </div>
        </div>
      </div>
    </div>
  `;
}

// 分页组件
function paginationHTML() {
  return `
    <div class="pagination">
      <div class="pg">←</div>
      <div class="pg active">1</div>
      <div class="pg">2</div>
      <div class="pg">3</div>
      <div class="pg">4</div>
      <div class="pg">5</div>
      <div class="pg">...</div>
      <div class="pg">15</div>
      <div class="pg">→</div>
    </div>
  `;
}

// ============== 页面注册表 ==============
const pages = {
  'home': { name: '首页', url: 'https://zifeng.novel/', render: pageHome },
  'category': { name: '分类', url: 'https://zifeng.novel/category', render: pageCategory },
  'shelf': { name: '书架', url: 'https://zifeng.novel/shelf', render: pageShelf },
  'booksource': { name: '书源管理', url: 'https://zifeng.novel/booksource', render: pageBookSource },
  'setting': { name: '设置', url: 'https://zifeng.novel/setting', render: pageSetting },
  'novel-detail': { name: '小说详情', url: 'https://zifeng.novel/novel/12345', render: pageNovelDetail },
  'rank-detail': { name: '榜单详情', url: 'https://zifeng.novel/rank/mustRead', render: pageRankDetail },
  'category-detail': { name: '分类详情', url: 'https://zifeng.novel/category-detail/1/1/1/玄幻', render: pageCategoryDetail },
  'login': { name: '登录 / 注册', url: 'https://zifeng.novel/login', render: pageLogin },
  'reset-password': { name: '重置密码', url: 'https://zifeng.novel/reset-password', render: pageResetPassword },
  'user-center': { name: '用户中心', url: 'https://zifeng.novel/user', render: pageUserCenter },
  'reader': { name: '阅读器', url: 'https://zifeng.novel/reader/12345', render: pageReader },
  'search': { name: '搜索结果', url: 'https://zifeng.novel/search?keyword=诡秘之主', render: pageSearch },
};

// ============== 路由切换 ==============
function navigate(pageKey) {
  const page = pages[pageKey];
  if (!page) return;
  document.getElementById('pageContainer').innerHTML = page.render();
  document.getElementById('currentPageName').textContent = page.name;
  document.getElementById('urlBar').textContent = page.url;
  // 更新侧栏 active
  document.querySelectorAll('.side-nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.page === pageKey);
  });
  // 滚动到顶
  document.querySelector('.canvas-frame').scrollIntoView({behavior:'smooth', block:'start'});
}

// 暗色切换
function toggleTheme() {
  const cur = document.body.dataset.theme;
  document.body.dataset.theme = cur === 'light' ? 'dark' : 'light';
  document.getElementById('toggleTheme').textContent = cur === 'light' ? '☀ 浅色模式' : '🌙 暗色模式';
}

// 主题色切换
function setPrimary(color) {
  const colors = themeColors[color];
  const root = document.documentElement;
  root.style.setProperty('--primary', color);
  root.style.setProperty('--primary-1', colors[4]);
  root.style.setProperty('--primary-2', colors[3]);
  root.style.setProperty('--primary-3', colors[2]);
  root.style.setProperty('--primary-4', colors[1]);
  document.querySelectorAll('.theme-pill').forEach(p => p.classList.toggle('active', p.dataset.primary === color));
}

// 初始化
document.addEventListener('DOMContentLoaded', () => {
  // 侧栏点击
  document.querySelectorAll('.side-nav-item').forEach(el => {
    el.addEventListener('click', () => navigate(el.dataset.page));
  });
  // 主题色点击
  document.querySelectorAll('.theme-pill').forEach(p => {
    p.addEventListener('click', () => setPrimary(p.dataset.primary));
  });
  // 暗色按钮
  document.getElementById('toggleTheme').addEventListener('click', toggleTheme);
  // 默认渲染首页
  navigate('home');
});
</script>
