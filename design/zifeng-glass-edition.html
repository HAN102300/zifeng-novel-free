<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440, initial-scale=1">
<title>紫枫免费小说 · Glass Edition</title>
<style>
/* ============================================================
   紫枫免费小说 · Glass Edition
   玻璃拟态 + 流光渐变 + 丝滑动画
   ============================================================ */

:root {
  /* 主色 — 经典蓝（玻璃质感） */
  --p: 24, 144, 255;          /* 主色 RGB（用于 rgba 合成） */
  --primary: #1890ff;
  --accent-1: #69c0ff;
  --accent-2: #b37feb;
  --accent-3: #ff85c0;

  /* 玻璃层级 */
  --glass-1: rgba(255, 255, 255, 0.55);   /* 强玻璃 */
  --glass-2: rgba(255, 255, 255, 0.35);   /* 中玻璃 */
  --glass-3: rgba(255, 255, 255, 0.18);   /* 弱玻璃 */
  --glass-border: rgba(255, 255, 255, 0.65);
  --glass-highlight: rgba(255, 255, 255, 0.85);

  /* 文本 */
  --text-1: #0f1a3a;
  --text-2: #4a5878;
  --text-3: #8a96b3;
  --text-glass: rgba(15, 26, 58, 0.72);

  /* 渐变 */
  --grad-primary: linear-gradient(135deg, #1890ff 0%, #69c0ff 100%);
  --grad-rainbow: linear-gradient(135deg, #1890ff 0%, #722ed1 50%, #ff85c0 100%);
  --grad-warm: linear-gradient(135deg, #fa8c16 0%, #ff85c0 100%);

  /* 阴影 */
  --shadow-glass: 0 8px 32px rgba(31, 38, 135, 0.12);
  --shadow-glass-lg: 0 20px 60px rgba(31, 38, 135, 0.18);
  --shadow-glow: 0 0 40px rgba(24, 144, 255, 0.35);

  /* 圆角 */
  --r-md: 14px;
  --r-lg: 20px;
  --r-xl: 28px;
  --r-full: 999px;
}

[data-theme="dark"] {
  --glass-1: rgba(30, 41, 70, 0.55);
  --glass-2: rgba(30, 41, 70, 0.35);
  --glass-3: rgba(30, 41, 70, 0.18);
  --glass-border: rgba(120, 144, 200, 0.25);
  --glass-highlight: rgba(180, 200, 255, 0.15);
  --text-1: #f0f4ff;
  --text-2: #b4c4e0;
  --text-3: #6a7a9a;
  --text-glass: rgba(240, 244, 255, 0.7);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
  font-size: 14px;
  color: var(--text-1);
  -webkit-font-smoothing: antialiased;
  background: #0a0e27;
  overflow-x: hidden;
}

/* ====== 全屏渐变流动背景 ====== */
.bg-canvas {
  position: fixed;
  inset: 0;
  z-index: -2;
  background: linear-gradient(135deg, #e8f0ff 0%, #f5e8ff 50%, #ffe8f3 100%);
  transition: background 0.6s ease;
}
[data-theme="dark"] .bg-canvas {
  background: linear-gradient(135deg, #0a0e27 0%, #1a1e3a 50%, #2a1e3a 100%);
}

/* 流动光斑 */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.55;
  z-index: -1;
  pointer-events: none;
  will-change: transform;
}
.orb-1 { width: 540px; height: 540px; background: radial-gradient(circle, #1890ff, transparent 70%); top: -120px; right: -120px; animation: orbFloat1 22s ease-in-out infinite; }
.orb-2 { width: 460px; height: 460px; background: radial-gradient(circle, #b37feb, transparent 70%); bottom: -100px; left: -100px; animation: orbFloat2 28s ease-in-out infinite; }
.orb-3 { width: 380px; height: 380px; background: radial-gradient(circle, #ff85c0, transparent 70%); top: 40%; left: 30%; animation: orbFloat3 25s ease-in-out infinite; opacity: 0.35; }
[data-theme="dark"] .orb { opacity: 0.4; }

@keyframes orbFloat1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-80px, 100px) scale(1.15); } }
@keyframes orbFloat2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(120px, -80px) scale(1.1); } }
@keyframes orbFloat3 { 0%,100% { transform: translate(0,0) scale(1); } 33% { transform: translate(60px, -60px) scale(1.2); } 66% { transform: translate(-80px, 40px) scale(0.9); } }

/* ====== 顶层 Shell ====== */
.app-shell { display: flex; min-height: 100vh; }

/* ---------- 左侧导览（玻璃） ---------- */
.side-nav {
  width: 240px;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
  padding: 28px 18px;
  background: var(--glass-2);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border-right: 1px solid var(--glass-border);
}
.side-brand {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 8px 24px;
  margin-bottom: 18px;
  border-bottom: 1px solid var(--glass-border);
}
.side-brand .logo {
  width: 38px; height: 38px;
  border-radius: 12px;
  background: var(--grad-primary);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 18px;
  box-shadow: 0 8px 20px rgba(24,144,255,0.4);
  position: relative;
  overflow: hidden;
}
.side-brand .logo::before {
  content: '';
  position: absolute;
  inset: 1px;
  border-radius: 11px;
  background: linear-gradient(135deg, rgba(255,255,255,0.4), transparent 60%);
}
.side-brand .name {
  font-size: 16px; font-weight: 700;
  color: var(--text-1);
  letter-spacing: 0.3px;
}
.side-brand .sub {
  font-size: 10px;
  color: var(--text-3);
  margin-top: 2px;
  letter-spacing: 1px;
}

.nav-group { margin-bottom: 18px; }
.nav-group-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-3);
  padding: 0 12px 8px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 12px;
  cursor: pointer;
  color: var(--text-2);
  font-size: 13px;
  margin-bottom: 3px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  border: 1px solid transparent;
}
.nav-item:hover {
  background: var(--glass-1);
  color: var(--text-1);
  transform: translateX(4px);
}
.nav-item.active {
  background: var(--glass-1);
  color: var(--primary);
  font-weight: 600;
  border-color: var(--glass-border);
  box-shadow: var(--shadow-glass);
}
.nav-item.active::before {
  content: '';
  position: absolute;
  left: -18px;
  top: 50%;
  transform: translateY(-50%);
  width: 4px; height: 18px;
  background: var(--grad-primary);
  border-radius: 0 4px 4px 0;
}
.nav-item .icon { font-size: 15px; width: 18px; text-align: center; }
.nav-item .num {
  margin-left: auto;
  font-size: 10px;
  color: var(--text-3);
  background: var(--glass-3);
  padding: 2px 7px;
  border-radius: 8px;
}
.nav-item.active .num { background: rgba(24,144,255,0.15); color: var(--primary); }

.side-footer {
  margin-top: 30px;
  padding: 16px 12px;
  background: var(--glass-2);
  border-radius: 16px;
  border: 1px solid var(--glass-border);
}
.side-footer .title { font-size: 11px; color: var(--text-3); margin-bottom: 10px; }
.theme-pills { display: flex; gap: 8px; }
.theme-pill {
  width: 22px; height: 22px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  position: relative;
}
.theme-pill:hover { transform: scale(1.15); }
.theme-pill.active {
  border-color: var(--glass-highlight);
  box-shadow: 0 0 0 2px currentColor, 0 4px 10px rgba(0,0,0,0.15);
}

/* ---------- 右侧画布 ---------- */
.canvas-area {
  flex: 1;
  min-width: 0;
  padding: 24px;
  overflow-x: auto;
}
.canvas-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  padding: 0 8px;
}
.crumb {
  display: flex; align-items: center; gap: 10px;
  font-size: 12px; color: var(--text-3);
}
.crumb .cur { color: var(--text-1); font-weight: 600; font-size: 14px; }
.toolbar-actions { display: flex; gap: 8px; }
.tool-btn {
  padding: 7px 14px;
  background: var(--glass-1);
  backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-full);
  color: var(--text-2);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.tool-btn:hover { color: var(--primary); transform: translateY(-1px); box-shadow: var(--shadow-glass); }
.tool-btn.active { background: var(--grad-primary); color: #fff; border-color: transparent; }

/* 浏览器画框 */
.browser-frame {
  width: 1440px;
  margin: 0 auto;
  background: var(--glass-2);
  backdrop-filter: blur(40px) saturate(200%);
  -webkit-backdrop-filter: blur(40px) saturate(200%);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-xl);
  overflow: hidden;
  box-shadow: var(--shadow-glass-lg);
  position: relative;
}
.browser-bar {
  height: 44px;
  background: var(--glass-3);
  display: flex;
  align-items: center;
  padding: 0 18px;
  gap: 10px;
  border-bottom: 1px solid var(--glass-border);
}
.browser-bar .dot { width: 12px; height: 12px; border-radius: 50%; }
.dot-r { background: #ff5f57; }
.dot-y { background: #febc2e; }
.dot-g { background: #28c840; }
.browser-url {
  flex: 1;
  background: var(--glass-1);
  border-radius: var(--r-full);
  padding: 6px 16px;
  font-size: 11px;
  color: var(--text-3);
  font-family: 'SF Mono', monospace;
  border: 1px solid var(--glass-border);
}

/* ============ 通用：玻璃卡片 ============ */
.glass {
  background: var(--glass-1);
  backdrop-filter: blur(24px) saturate(180%);
  -webkit-backdrop-filter: blur(24px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-glass);
  position: relative;
  overflow: hidden;
}
.glass::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
}

/* ============ 顶部导航（玻璃悬浮） ============ */
.navbar {
  height: 70px;
  background: var(--glass-2);
  backdrop-filter: blur(30px) saturate(200%);
  -webkit-backdrop-filter: blur(30px) saturate(200%);
  border-bottom: 1px solid var(--glass-border);
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 28px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.nav-logo {
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
}
.nav-logo .logo-icon {
  width: 36px; height: 36px;
  border-radius: 11px;
  background: var(--grad-primary);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 17px;
  box-shadow: 0 6px 18px rgba(24,144,255,0.4);
  position: relative;
  overflow: hidden;
}
.nav-logo .logo-icon::before {
  content: '';
  position: absolute;
  inset: 1px;
  border-radius: 10px;
  background: linear-gradient(135deg, rgba(255,255,255,0.45), transparent 60%);
}
.nav-logo .brand-text {
  font-size: 17px; font-weight: 700;
  background: var(--grad-primary);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.nav-menu { display: flex; gap: 4px; flex: 1; }
.nav-menu-item {
  padding: 9px 18px;
  font-size: 14px;
  color: var(--text-2);
  border-radius: var(--r-full);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.nav-menu-item:hover { color: var(--primary); background: var(--glass-1); }
.nav-menu-item.active {
  background: var(--grad-primary);
  color: #fff;
  box-shadow: 0 6px 18px rgba(24,144,255,0.35);
}
.nav-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }

.search-pill {
  width: 240px; height: 40px;
  background: var(--glass-1);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-full);
  padding: 0 18px;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--text-3);
  cursor: text;
  transition: all 0.25s;
}
.search-pill:hover { border-color: rgba(24,144,255,0.4); box-shadow: 0 4px 12px rgba(24,144,255,0.15); }

.user-chip {
  display: flex; align-items: center; gap: 10px;
  padding: 4px 16px 4px 4px;
  border-radius: var(--r-full);
  background: var(--glass-1);
  border: 1px solid var(--glass-border);
  cursor: pointer;
  height: 40px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.user-chip:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(24,144,255,0.25);
  border-color: rgba(24,144,255,0.4);
}
.user-chip .avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--grad-rainbow);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 13px; font-weight: 600;
}
.user-chip .uname { font-size: 13px; font-weight: 600; color: var(--text-1); }

.theme-toggle {
  width: 48px; height: 26px;
  background: var(--glass-1);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-full);
  position: relative;
  cursor: pointer;
  transition: all 0.3s;
}
.theme-toggle::after {
  content: '☀';
  position: absolute;
  top: 2px; left: 2px;
  width: 20px; height: 20px;
  background: var(--grad-warm);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
}
[data-theme="dark"] .theme-toggle::after { left: 26px; content: '☾'; background: var(--grad-primary); }

/* ============ 页面内容容器 ============ */
.page-content {
  padding: 36px 48px 64px;
  max-width: 1360px;
  margin: 0 auto;
}

/* ============ 通用：标题区 ============ */
.page-header { margin-bottom: 32px; animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
.page-header h1 {
  font-size: 32px;
  font-weight: 700;
  color: var(--text-1);
  margin-bottom: 8px;
  letter-spacing: -0.5px;
}
.page-header p {
  font-size: 14px;
  color: var(--text-3);
}

/* 通用动画 */
@keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
@keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
@keyframes glowPulse { 0%, 100% { box-shadow: 0 0 30px rgba(24,144,255,0.3); } 50% { box-shadow: 0 0 50px rgba(24,144,255,0.55); } }

.stagger > * { animation: fadeUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) backwards; }
.stagger > *:nth-child(1) { animation-delay: 0.05s; }
.stagger > *:nth-child(2) { animation-delay: 0.1s; }
.stagger > *:nth-child(3) { animation-delay: 0.15s; }
.stagger > *:nth-child(4) { animation-delay: 0.2s; }
.stagger > *:nth-child(5) { animation-delay: 0.25s; }
.stagger > *:nth-child(6) { animation-delay: 0.3s; }
.stagger > *:nth-child(7) { animation-delay: 0.35s; }
.stagger > *:nth-child(8) { animation-delay: 0.4s; }

/* 渐变文字 */
.grad-text {
  background: var(--grad-rainbow);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  background-size: 200% auto;
  animation: shimmer 5s linear infinite;
}

/* 返回按钮 */
.back-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 18px;
  background: var(--glass-1);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-full);
  color: var(--text-2);
  font-size: 13px;
  cursor: pointer;
  margin-bottom: 24px;
  transition: all 0.25s;
}
.back-btn:hover {
  color: var(--primary);
  transform: translateX(-4px);
  border-color: rgba(24,144,255,0.4);
  box-shadow: 0 4px 12px rgba(24,144,255,0.15);
}

/* ============ 主按钮 ============ */
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 22px;
  background: var(--glass-1);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-full);
  font-size: 13px;
  color: var(--text-1);
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  backdrop-filter: blur(12px);
}
.btn:hover { transform: translateY(-2px); box-shadow: var(--shadow-glass); }
.btn.primary {
  background: var(--grad-primary);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 8px 24px rgba(24,144,255,0.35);
}
.btn.primary:hover {
  box-shadow: 0 12px 32px rgba(24,144,255,0.5);
  transform: translateY(-3px);
}
.btn.large { padding: 13px 28px; font-size: 14px; }
.btn.text { background: transparent; border: none; color: var(--primary); padding: 6px 12px; }

/* 输入框 */
.input-glass {
  width: 100%;
  height: 46px;
  padding: 0 18px;
  background: var(--glass-1);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-md);
  font-size: 14px;
  color: var(--text-1);
  transition: all 0.25s;
  backdrop-filter: blur(12px);
}
.input-glass::placeholder { color: var(--text-3); }
.input-glass:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(24,144,255,0.12);
  background: var(--glass-1);
}

/* ============ 通用：小说封面卡（玻璃） ============ */
.novel-card {
  background: var(--glass-1);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-lg);
  overflow: hidden;
  cursor: pointer;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.novel-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--glass-highlight), transparent);
  z-index: 2;
}
.novel-card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: var(--shadow-glass-lg);
  border-color: rgba(24,144,255,0.4);
}
.novel-card .cover {
  width: 100%;
  height: 200px;
  position: relative;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 24px;
  font-weight: 700;
  text-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.novel-card .cover::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.5));
}
.novel-card .body { padding: 14px 16px; }
.novel-card .name {
  font-size: 14px; font-weight: 600;
  color: var(--text-1);
  margin-bottom: 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.novel-card .author {
  font-size: 12px; color: var(--text-3);
}

/* ============ 章节标题（极简） ============ */
.section-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 18px;
  padding: 0 4px;
}
.section-head .title {
  font-size: 20px;
  font-weight: 600;
  color: var(--text-1);
  letter-spacing: -0.3px;
}
.section-head .more {
  font-size: 12px;
  color: var(--primary);
  cursor: pointer;
  padding: 6px 14px;
  border-radius: var(--r-full);
  background: var(--glass-1);
  border: 1px solid var(--glass-border);
  transition: all 0.2s;
}
.section-head .more:hover { transform: translateX(4px); }

/* ============ 排行榜行（玻璃极简） ============ */
.rank-row {
  display: flex;
  align-items: center;
  gap: 18px;
  padding: 18px 24px;
  border-bottom: 1px solid var(--glass-border);
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
}
.rank-row:last-child { border-bottom: none; }
.rank-row:hover {
  background: var(--glass-1);
  padding-left: 32px;
}
.rank-row .num {
  width: 36px; height: 36px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  background: var(--glass-2);

}

/* Tag */
.tag {
  display: inline-flex;
  font-size: 11px;
  padding: 3px 10px;

.tag.primary { background: rgba(24,144,255,0.12); color: var(--primary); border-color: rgba(24,144,255,0.25); }

/* 分页 */

  gap: 8px;

}
.pg-btn {

.pg-btn:hover { color: var(--primary); transform: translateY(-2px); border-color: rgba(24,144,255,0.4); }
.pg-btn.active {

}

/* Toggle 开关 */
.toggle {
  width: 48px; height: 26px;
  background: var(--glass-2);
  border: 1px solid var(--glass-border);
  border-radius: var(--r-full);
  position: relative;
  cursor: pointer;
  transition: all 0.3s;
}
.toggle::after {
  content: '';
  position: absolute;
  top: 2px; left: 2px;

  background: #fff;
  border-radius: 50%;
  transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);

}
.toggle.on { background: var(--grad-primary); border-color: transparent; }
.toggle.on::after { left: 24px; }

/* Page 切换 */
.page { display: none; animation: fadeIn 0.5s ease; }
.page.active { display: block; }

  'reader': { name:'阅读器', url:'https://zifeng.novel/reader/12345', render:pageReader },
  'search': { name:'搜索结果', url:'https://zifeng.novel/search?keyword=诡秘之主', render:pageSearch },
};

function navigate(key) {
  const p = pages[key];
  if (!p) return;
  document.getElementById('pageContainer').innerHTML = p.render();
  document.getElementById('curName').textContent = p.name;
  document.getElementById('urlBar').textContent = p.url;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.page === key));
  document.querySelector('.browser-frame').scrollIntoView({ behavior:'smooth', block:'start' });
  // 滚到顶部
  setTimeout(() => document.querySelector('.browser-frame').scrollTop = 0, 100);
}

function toggleTheme() {
  const cur = document.body.dataset.theme;
  const next = cur === 'light' ? 'dark' : 'light';
  document.body.dataset.theme = next;
  document.getElementById('themeToggle').textContent = next === 'light' ? '🌙 暗色' : '☀ 浅色';
}

function setPrimary(p, c1, c2, c3) {
  const root = document.documentElement;
  root.style.setProperty('--primary', p);
  root.style.setProperty('--accent-1', c1);
  root.style.setProperty('--accent-2', c2);
  root.style.setProperty('--accent-3', c3);
  root.style.setProperty('--grad-primary', `linear-gradient(135deg, ${p} 0%, ${c1} 100%)`);
  root.style.setProperty('--grad-rainbow', `linear-gradient(135deg, ${p} 0%, ${c2} 50%, ${c3} 100%)`);
  document.querySelectorAll('.theme-pill').forEach(el => el.classList.toggle('active', el.dataset.primary === p));
}

document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.nav-item').forEach(el => el.addEventListener('click', () => navigate(el.dataset.page)));
  document.querySelectorAll('.theme-pill').forEach(el => el.addEventListener('click', () => setPrimary(el.dataset.primary, el.dataset.c1, el.dataset.c2, el.dataset.c3)));
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  navigate('home');
});
</script>
