version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: zifeng-mysql
    environment:
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: zifeng_novel
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./deploy/init/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: zifeng-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  parser:
    build:
      context: ./zifeng-parser
      dockerfile: Dockerfile
    container_name: zifeng-parser
    ports:
      - "${PARSER_PORT:-3001}:3001"
    environment:
      - PORT=3001
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8088}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  server:
    build:
      context: ./zifeng-server
      dockerfile: Dockerfile
    container_name: zifeng-server
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/zifeng_novel?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER:-root}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-changeme}
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SPRING_REDIS_PASSWORD=${REDIS_PASSWORD:-changeme}
      - PING_PARSER_URL=http://parser:3001
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./zifeng-web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: zifeng-web

  admin:
    build:
      context: ./zifeng-admin
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: zifeng-admin

  nginx:
    image: nginx:1.20-alpine
    container_name: zifeng-nginx
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./deploy/nginx/nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_ssl_certs:/etc/nginx/ssl:ro
    depends_on:
      - web
      - admin
      - server
      - parser
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  nginx_ssl_certs:
