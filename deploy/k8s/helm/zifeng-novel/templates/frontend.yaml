    spec:
      containers:
        - name: admin
          image: "{{ .Values.global.registry }}/{{ $adminValues.image.repository }}:{{ $adminValues.image.tag }}"
          imagePullPolicy: {{ $adminValues.image.pullPolicy }}
          ports:
            - name: http
