{{- /*
紫枫免费小说 - zifeng-parser Kubernetes Deployment模板
*/}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "zifeng-novel.fullname" . }}-parser
  labels:
    {{- include "zifeng-novel.labels" . | nindent 4 }}
    app.kubernetes.io/component: parser
    version: {{ .Values.parser.image.tag | default "latest" | quote }}
spec:
  replicas: {{ .Values.parser.replicas }}
  selector:
    matchLabels:
      {{- include "zifeng-novel.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: parser
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        {{- include "zifeng-novel.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: parser
        version: {{ .Values.parser.image.tag | default "latest" | quote }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/api/metrics"
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: parser
          image: "{{ .Values.global.registry }}/{{ .Values.parser.image.repository }}:{{ .Values.parser.image.tag }}"
          imagePullPolicy: {{ .Values.parser.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: CORS_ORIGINS
              value: {{ printf "https://%s" .Values.global.domain | quote }}
          {{- with .Values.parser.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.parser.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.parser.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zifeng-novel.fullname" . }}-parser
  labels:
    {{- include "zifeng-novel.labels" . | nindent 4 }}
    app.kubernetes.io/component: parser
spec:
  type: ClusterIP
  ports:
    - port: 3001
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "zifeng-novel.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: parser
---
{{- if .Values.parser.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "zifeng-novel.fullname" . }}-parser
  labels:
    {{- include "zifeng-novel.labels" . | nindent 4 }}
    app.kubernetes.io/component: parser
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "zifeng-novel.fullname" . }}-parser
  minReplicas: {{ .Values.parser.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.parser.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.parser.autoscaling.targetCPUUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
{{- end }}
