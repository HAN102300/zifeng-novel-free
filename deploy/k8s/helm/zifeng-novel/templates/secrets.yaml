{{- /*
紫枫免费小说 - Secret 模板
敏感配置通过Kubernetes Secret管理
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zifeng-novel.fullname" . }}-db-secret
  labels:
    {{- include "zifeng-novel.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.mysql.auth.username | default "zifeng" | quote }}
  password: {{ .Values.mysql.auth.password | required "mysql.auth.password is required" | quote }}
  root-password: {{ .Values.mysql.auth.rootPassword | required "mysql.auth.rootPassword is required" | quote }}
  replication-password: {{ .Values.mysql.auth.replicationPassword | required "mysql.auth.replicationPassword is required" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zifeng-novel.fullname" . }}-redis-secret
  labels:
    {{- include "zifeng-novel.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.redis.auth.password | required "redis.auth.password is required" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "zifeng-novel.fullname" . }}-admin-secret
  labels:
    {{- include "zifeng-novel.labels" . | nindent 4 }}
type: Opaque
stringData:
  grafana-password: {{ .Values.monitoring.grafana.adminPassword | default "admin" | quote }}
