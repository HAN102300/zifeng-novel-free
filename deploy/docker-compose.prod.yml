# ============================================================
# 紫枫免费小说 - 生产级 Docker Compose 部署配置
# 方案A：单机全容器化部署（<5000用户）
# 7个服务：nginx + server + parser + web + admin + mysql + redis
# ============================================================
version: "3.8"

services:
  # ==================== 网关 Nginx ====================
  nginx:
    image: nginx:1.25-alpine
    container_name: zifeng-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro           # SSL证书目录
      - nginx_logs:/var/log/nginx
    depends_on:
      server:
        condition: service_healthy
      parser:
        condition: service_healthy
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
    networks:
      - zifeng-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== SpringBoot 后端 ====================
  server:
    build:
      context: ../../zifeng-server
      dockerfile: ../deploy/docker/Dockerfile.server
    container_name: zifeng-server
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/zifeng_novel?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER:-zifeng}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD:-Zifeng2024!Prod}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-Zifeng2024!Redis}
      - SA_TOKEN_TIMEOUT=${SA_TOKEN_TIMEOUT:-7200}
      - APP_CORS_ALLOWED_ORIGINS=${CORS_ORIGINS:-https://your-domain.com}
      - APP_UPLOAD_DIR=/app/uploads/avatars
      - PARSING_SERVER_URL=http://parser:3001
    volumes:
      - server_uploads:/app/uploads
      - server_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zifeng-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/auth/info"]
      interval: 30s
      timeout: 5s
      start_period: 90s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1.5"
        reservations:
          memory: 512M
          cpus: "0.5"

  # ==================== Parser 解析引擎 ====================
  parser:
    build:
      context: ../../zifeng-parser
      dockerfile: ../deploy/docker/Dockerfile.parser
    container_name: zifeng-parser
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGINS=${CORS_ORIGINS:-https://your-domain.com}
    networks:
      - zifeng-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M
          cpus: "0.25"

  # ==================== 前台 Web ====================
  web:
    build:
      context: ../../zifeng-web
      dockerfile: ../deploy/docker/Dockerfile.web
    container_name: zifeng-web
    restart: always
    networks:
      - zifeng-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M

  # ==================== 后台 Admin ====================
  admin:
    build:
      context: ../../zifeng-admin
      dockerfile: ../deploy/docker/Dockerfile.admin
    container_name: zifeng-admin
    restart: always
    networks:
      - zifeng-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.5"
        reservations:
          memory: 32M

  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0
    container_name: zifeng-mysql
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-Zifeng2024!Root}
      - MYSQL_DATABASE=zifeng_novel
      - MYSQL_USER=${MYSQL_USER:-zifeng}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-Zifeng2024!Prod}
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    command: >
      --default-authentication-plugin=mysql_native_password
      --max-connections=200
      --innodb-buffer-pool-size=256M
      --innodb-log-file-size=64M
      --slow-query-log=1
      --slow-query-log-file=/var/log/mysql/slow.log
      --long-query-time=2
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    ports:
      - "127.0.0.1:3306:3306"  # 仅本地访问
    volumes:
      - mysql_data:/var/lib/mysql
      - mysql_log:/var/log/mysql
      - ./init/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - zifeng-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-Zifeng2024!Root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
        reservations:
          memory: 256M

  # ==================== Redis 7 ====================
  redis:
    image: redis:7-alpine
    container_name: zifeng-redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-Zifeng2024!Redis}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "127.0.0.1:6379:6379"  # 仅本地访问
    volumes:
      - redis_data:/data
    networks:
      - zifeng-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-Zifeng2024!Redis}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: "0.5"
        reservations:
          memory: 128M

# ==================== 数据卷 ====================
volumes:
  mysql_data:
    driver: local
  mysql_log:
    driver: local
  redis_data:
    driver: local
  server_uploads:
    driver: local
  server_logs:
    driver: local
  nginx_logs:
    driver: local

# ==================== 网络 ====================
networks:
  zifeng-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
