# ============================================================
# 紫枫免费小说 - GitHub Actions CI/CD 流水线
# 触发条件：push到main/staging分支 或 手动触发
# 流程：代码检查 -> 构建 -> 测试 -> 构建镜像 -> 推送镜像 -> 部署
# ============================================================
name: Zifeng Novel CI/CD Pipeline

on:
  push:
    branches: [main, staging]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      skip_tests:
        description: '跳过测试（紧急修复）'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  JAVA_VERSION: '17'
  NODE_VERSION: '20'

jobs:
  # ==================== 代码检查 ====================
  lint:
    name: 代码质量检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Java代码检查
      - name: 设置JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 缓存Maven依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('zifeng-server/pom.xml') }}
          restore-keys: maven-

      - name: Java代码检查
        working-directory: zifeng-server
        run: mvn checkstyle:check -q || true

      # Node.js代码检查
      - name: 设置Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            zifeng-parser/package-lock.json
            zifeng-web/package-lock.json
            zifeng-admin/package-lock.json

      - name: Parser代码检查
        working-directory: zifeng-parser
        run: |
          npm ci
          npx eslint . --quiet || true

      - name: Web前端代码检查
        working-directory: zifeng-web
        run: |
          npm ci
          npx eslint . --quiet || true

      - name: Admin前端代码检查
        working-directory: zifeng-admin
        run: |
          npm ci
          npx eslint . --quiet || true

  # ==================== 后端构建与测试 ====================
  build-server:
    name: 后端构建测试
    runs-on: ubuntu-latest
    needs: lint
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: test_root
          MYSQL_DATABASE: zifeng_novel_test
          MYSQL_USER: zifeng_test
          MYSQL_PASSWORD: test_pass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - name: 设置JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 缓存Maven依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('zifeng-server/pom.xml') }}
          restore-keys: maven-

      - name: Maven构建与测试
        working-directory: zifeng-server
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/zifeng_novel_test?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
          SPRING_DATASOURCE_USERNAME: zifeng_test
          SPRING_DATASOURCE_PASSWORD: test_pass
          SPRING_DATA_REDIS_HOST: 127.0.0.1
          SPRING_DATA_REDIS_PORT: 6379
        run: mvn clean verify -B

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-report
          path: zifeng-server/target/surefire-reports/
          retention-days: 7

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: server-jar
          path: zifeng-server/target/zifeng-novel-backend-1.0.0.jar
          retention-days: 1

  # ==================== 前端构建 ====================
  build-frontend:
    name: 前端构建
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        app: [web, admin]
    steps:
      - uses: actions/checkout@v4

      - name: 设置Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: zifeng-${{ matrix.app }}/package-lock.json

      - name: 安装依赖并构建
        working-directory: zifeng-${{ matrix.app }}
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: /api
          VITE_BACKEND_URL: /api

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-dist
          path: zifeng-${{ matrix.app }}/dist/
          retention-days: 1

  # ==================== Docker镜像构建与推送 ====================
  build-images:
    name: 构建Docker镜像
    runs-on: ubuntu-latest
    needs: [build-server, build-frontend]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: server
            context: zifeng-server
            dockerfile: deploy/docker/Dockerfile.server
          - name: parser
            context: zifeng-parser
            dockerfile: deploy/docker/Dockerfile.parser
          - name: web
            context: zifeng-web
            dockerfile: deploy/docker/Dockerfile.web
          - name: admin
            context: zifeng-admin
            dockerfile: deploy/docker/Dockerfile.admin
    steps:
      - uses: actions/checkout@v4

      - name: 登录容器镜像仓库
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 提取元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - name: 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          file: ${{ matrix.service.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # ==================== 部署到Staging ====================
  deploy-staging:
    name: 部署到Staging
    runs-on: ubuntu-latest
    needs: build-images
    if: github.ref == 'refs/heads/staging' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
      url: https://staging.${{ vars.DOMAIN }}
    steps:
      - uses: actions/checkout@v4

      - name: 部署到Staging服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            cd /opt/zifeng-novel
            export IMAGE_TAG=sha-${{ github.sha }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            docker image prune -f

      - name: 健康检查验证
        run: |
          sleep 30
          curl -sf https://staging.${{ vars.DOMAIN }}/nginx-health || exit 1
          curl -sf https://staging.${{ vars.DOMAIN }}/api/health || exit 1

  # ==================== 部署到Production ====================
  deploy-production:
    name: 部署到Production
    runs-on: ubuntu-latest
    needs: build-images
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
      url: https://${{ vars.DOMAIN }}
    steps:
      - uses: actions/checkout@v4

      - name: 部署到Production服务器
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/zifeng-novel
            # 备份当前版本
            ./scripts/backup.sh
            # 拉取新镜像
            export IMAGE_TAG=${{ github.ref_name }}
            docker compose -f docker-compose.prod.yml pull
            # 滚动更新
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
            # 清理旧镜像
            docker image prune -f

      - name: 生产环境健康检查
        run: |
          sleep 45
          curl -sf https://${{ vars.DOMAIN }}/nginx-health || exit 1
          curl -sf https://${{ vars.DOMAIN }}/api/health || exit 1

      - name: 部署通知
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "紫枫小说部署 ${{ job.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*部署状态*: ${{ job.status }}\n*版本*: ${{ github.ref_name }}\n*环境*: Production\n*触发者*: ${{ github.actor }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
