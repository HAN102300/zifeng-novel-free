# ============================================================
# Nginx 灰度发布流量分配配置 - Docker Swarm 方案
# 基于Cookie/Header的灰度流量控制
# ============================================================

# 限流区域
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

# 灰度版本上游定义
upstream parser_v1 {
    server parser:3001;
    keepalive 32;
}

upstream parser_v2 {
    server parser-v2:3001;
    keepalive 32;
}

upstream server_v1 {
    server server:8080;
    keepalive 32;
}

upstream server_v2 {
    server server-v2:8080;
    keepalive 32;
}

# 灰度流量映射（基于Cookie或Header）
# x-canary: v1=稳定版, v2=灰度版
map $cookie_x_canary $parser_backend {
    "v2"    parser_v2;
    default parser_v1;
}

map $cookie_x_canary $server_backend {
    "v2"    server_v2;
    default server_v1;
}

# 也支持通过Header控制
map $http_x_canary $canary_override {
    "v2"    "v2";
    default "";
}

# 合并Cookie和Header策略
map $canary_override$cookie_x_canary $final_canary {
    "v2"    "v2";
    "v2v1"  "v2";
    "v2v2"  "v2";
    default "v1";
}

map $final_canary $parser_upstream {
    "v2"    parser_v2;
    default parser_v1;
}

map $final_canary $server_upstream {
    "v2"    server_v2;
    default server_v1;
}

# HTTP -> HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS 主服务
server {
    listen 443 ssl http2;
    server_name your-domain.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Canary $final_canary always;  # 返回当前版本标识

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    client_max_body_size 10m;

    # ========== 前台（灰度版本通过Cookie切换） ==========
    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ========== 后台管理 ==========
    location /admin/ {
        rewrite ^/admin/(.*) /$1 break;
        proxy_pass http://admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ========== Parser API（灰度路由） ==========
    location /api/search {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://parser_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Canary-Version $final_canary;
        proxy_connect_timeout 20s;
        proxy_read_timeout 30s;
    }

    location /api/test-source {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://parser_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Canary-Version $final_canary;
        proxy_read_timeout 60s;
    }

    location /api/book-info {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://parser_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Canary-Version $final_canary;
    }

    location /api/toc {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://parser_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Canary-Version $final_canary;
    }

    location /api/content {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://parser_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Canary-Version $final_canary;
    }

    location /api/explore {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://parser_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Canary-Version $final_canary;
    }

    location /api/proxy {
        limit_req zone=api_limit burst=10 nodelay;
        proxy_pass http://parser_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Canary-Version $final_canary;
    }

    location /api/import-from-url {
        proxy_pass http://parser_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Canary-Version $final_canary;
    }

    location /api/import-from-json {
        proxy_pass http://parser_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Canary-Version $final_canary;
    }

    location /api/health {
        proxy_pass http://parser_upstream;
        proxy_set_header Host $host;
        access_log off;
    }

    # ========== SpringBoot API（灰度路由） ==========
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://server_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Canary-Version $final_canary;
    }

    location /api/bookshelf {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://server_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Canary-Version $final_canary;
    }

    location /api/reading {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://server_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Canary-Version $final_canary;
    }

    location /api/sources {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://server_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Canary-Version $final_canary;
    }

    location /api/parse {
        proxy_pass http://server_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Canary-Version $final_canary;
    }

    location /api/user/ {
        proxy_pass http://server_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Canary-Version $final_canary;

        location /api/user/avatar {
            client_max_body_size 5m;
            proxy_pass http://server_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Canary-Version $final_canary;
        }
    }

    location /api/admin/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://server_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Canary-Version $final_canary;
    }

    # ========== 健康检查 ==========
    location /nginx-health {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
