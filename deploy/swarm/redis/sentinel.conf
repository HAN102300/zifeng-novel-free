# ============================================================
# Redis Sentinel 配置 - Docker Swarm 方案
# 3个Sentinel节点保证故障检测的可靠性
# ============================================================
port 26379
dir /tmp

sentinel monitor zifeng-master redis-master 6379 2
sentinel down-after-milliseconds zifeng-master 10000
sentinel failover-timeout zifeng-master 30000
sentinel parallel-syncs zifeng-master 1

# 密码通过环境变量注入，此处使用占位符
# 实际部署时需要替换或通过启动脚本生成
sentinel auth-pass zifeng-master REPLACE_REDIS_PASSWORD

# 通知脚本（可选）
# sentinel notification-script zifeng-master /etc/redis/notify.sh
# sentinel client-reconfig-script zifeng-master /etc/redis/reconfig.sh

loglevel notice
logfile ""
