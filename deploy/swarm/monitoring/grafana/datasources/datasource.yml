# ============================================================
# Grafana 数据源配置 - 自动加载
# ============================================================
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: '15s'

  - name: MySQL
    type: mysql
    url: mysql-master:3306
    database: zifeng_novel
    user: ${MYSQL_USER}
    secureJsonData:
      password: ${MYSQL_PASSWORD}
    editable: true
