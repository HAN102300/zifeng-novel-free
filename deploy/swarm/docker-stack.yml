# ============================================================
# 紫枫免费小说 - Docker Stack 部署配置
# 方案B：Docker Swarm 多机集群部署（5000-50000用户）
#
# 集群节点规划：
#   - manager-01 (2C4G): Nginx网关 + 监控
#   - manager-02 (2C4G): Nginx网关(备) + 日志
#   - worker-01  (4C8G): zifeng-server x2 + zifeng-parser x2
#   - worker-02  (4C8G): zifeng-server x2 + zifeng-parser x2
#   - worker-03  (4C8G): MySQL主 + Redis主
#   - worker-04  (4C8G): MySQL从 + Redis从
#   - worker-05  (2C4G): zifeng-web + zifeng-admin + Prometheus + Grafana
# ============================================================
version: "3.8"

services:
  # ==================== Nginx 网关（2副本） ====================
  nginx:
    image: nginx:1.25-alpine
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 0
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: ingress
      - target: 443
        published: 443
        protocol: tcp
        mode: ingress
    volumes:
      - ./nginx/nginx-gateway.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - zifeng-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/nginx-health"]
      interval: 15s
      timeout: 3s
      retries: 3

  # ==================== SpringBoot 后端（4副本） ====================
  server:
    image: ghcr.io/${REGISTRY_NS:-zifeng}/zifeng-server:latest
    deploy:
      replicas: 4
      update_config:
        parallelism: 2
        delay: 30s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 2
        order: stop-first
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 180s
      placement:
        constraints:
          - node.labels.role == app
      resources:
        limits:
          cpus: "1.5"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 512M
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-master:3306/zifeng_novel?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=${MYSQL_USER:-zifeng}
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_PASSWORD}
      - SPRING_DATA_REDIS_HOST=redis-master
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD}
      - PARSING_SERVER_URL=http://parser:3001
      - APP_CORS_ALLOWED_ORIGINS=${CORS_ORIGINS}
    volumes:
      - server_uploads:/app/uploads
    networks:
      - zifeng-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/auth/info"]
      interval: 20s
      timeout: 5s
      start_period: 90s
      retries: 5

  # ==================== Parser 解析引擎（4副本） ====================
  parser:
    image: ghcr.io/${REGISTRY_NS:-zifeng}/zifeng-parser:latest
    deploy:
      replicas: 4
      update_config:
        parallelism: 2
        delay: 15s
        failure_action: rollback
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
      placement:
        constraints:
          - node.labels.role == app
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    environment:
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGINS=${CORS_ORIGINS}
    networks:
      - zifeng-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 20s
      timeout: 5s
      retries: 3

  # ==================== 前台 Web（2副本） ====================
  web:
    image: ghcr.io/${REGISTRY_NS:-zifeng}/zifeng-web:latest
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 5s
        failure_action: rollback
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.role == frontend
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M
    networks:
      - zifeng-net

  # ==================== 后台 Admin（1副本） ====================
  admin:
    image: ghcr.io/${REGISTRY_NS:-zifeng}/zifeng-admin:latest
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        failure_action: rollback
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.labels.role == frontend
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M
    networks:
      - zifeng-net

  # ==================== MySQL 主节点 ====================
  mysql-master:
    image: mysql:8.0
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db-master
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "1.0"
          memory: 1024M
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=zifeng_novel
      - MYSQL_USER=${MYSQL_USER:-zifeng}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    command: >
      --default-authentication-plugin=mysql_native_password
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --binlog-do-db=zifeng_novel
      --max-connections=500
      --innodb-buffer-pool-size=1G
      --innodb-log-file-size=256M
      --slow-query-log=1
      --long-query-time=2
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_master_data:/var/lib/mysql
      - mysql_master_log:/var/log/mysql
    networks:
      - zifeng-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==================== MySQL 从节点 ====================
  mysql-slave:
    image: mysql:8.0
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db-slave
      resources:
        limits:
          cpus: "2.0"
          memory: 2048M
        reservations:
          cpus: "1.0"
          memory: 1024M
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    command: >
      --default-authentication-plugin=mysql_native_password
      --server-id=2
      --relay-log=relay-bin
      --read-only=1
      --binlog-format=ROW
      --max-connections=500
      --innodb-buffer-pool-size=1G
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_slave_data:/var/lib/mysql
    networks:
      - zifeng-net
    depends_on:
      - mysql-master
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ==================== Redis 主节点 ====================
  redis-master:
    image: redis:7-alpine
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db-master
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.5"
          memory: 256M
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory 384mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_master_data:/data
    networks:
      - zifeng-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==================== Redis 从节点 ====================
  redis-slave:
    image: redis:7-alpine
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == db-slave
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --slaveof redis-master 6379
      --masterauth ${REDIS_PASSWORD}
      --appendonly yes
      --maxmemory 384mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_slave_data:/data
    networks:
      - zifeng-net
    depends_on:
      - redis-master

  # ==================== Redis Sentinel x3 ====================
  redis-sentinel:
    image: redis:7-alpine
    deploy:
      replicas: 3
      update_config:
        parallelism: 1
        delay: 15s
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == worker
    command: >
      redis-server
      /etc/redis/sentinel.conf
      --sentinel
    volumes:
      - ./redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    networks:
      - zifeng-net
    depends_on:
      - redis-master

  # ==================== Prometheus ====================
  prometheus:
    image: prom/prometheus:v2.51.0
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == monitor
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.5"
          memory: 512M
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - zifeng-net
    ports:
      - target: 9090
        published: 9090
        protocol: tcp
        mode: host

  # ==================== Grafana ====================
  grafana:
    image: grafana/grafana:10.4.0
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.labels.role == monitor
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          memory: 128M
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - zifeng-net
    ports:
      - target: 3000
        published: 3000
        protocol: tcp
        mode: host
    depends_on:
      - prometheus

  # ==================== Node Exporter（全局服务，每节点一个） ====================
  node-exporter:
    image: prom/node-exporter:v1.7.0
    deploy:
      mode: global
      resources:
        limits:
          memory: 64M
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
    networks:
      - zifeng-net

  # ==================== cAdvisor（容器监控） ====================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    deploy:
      mode: global
      resources:
        limits:
          memory: 128M
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - zifeng-net

volumes:
  mysql_master_data:
  mysql_master_log:
  mysql_slave_data:
  redis_master_data:
  redis_slave_data:
  server_uploads:
  prometheus_data:
  grafana_data:

networks:
  zifeng-net:
    driver: overlay
    attachable: true
    ipam:
      config:
        - subnet: 10.10.0.0/16
